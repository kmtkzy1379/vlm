# VLM Screen Recognition - Default Configuration

capture:
  target_fps: 2.0
  monitor: 0  # 0 = primary monitor
  max_dimension: 1920  # downscale if larger

change_detection:
  phash_threshold: 12      # hamming distance (0-64), higher = more sensitive
  ssim_threshold_major: 0.50  # below this = MAJOR change
  ssim_threshold_moderate: 0.80  # below this = MODERATE
  ssim_downscale: 256      # downscale to NxN for SSIM
  periodic_interval: 10    # force small model every N idle frames

detection:
  small_model: "yolov8n"   # lightweight, periodic checks
  mid_model: "yolov8m"     # detailed, scene changes
  confidence_threshold: 0.35
  nms_threshold: 0.45
  input_size: 640

tracking:
  max_age: 30              # frames before track is retired
  min_hits: 3              # detections before track is confirmed
  iou_threshold: 0.3
  max_entities: 100        # hard limit on simultaneous tracks

analysis:
  pose_model_complexity: 1       # 0=lite, 1=full, 2=heavy
  pose_min_confidence: 0.5
  expression_actions: ["emotion"]
  skip_if_iou_above: 0.9        # skip re-analysis if barely moved
  skip_if_frames_below: 5       # min frames between re-analysis

predictive_coding:
  enabled: true
  diff_threshold: 25         # pixel intensity difference threshold (0-255)
  min_region_area: 500       # minimum changed region area in pixels
  morph_kernel_size: 5       # morphological cleanup kernel size
  merge_distance: 30         # merge nearby regions within N pixels

saliency:
  enabled: true
  top_k: 5                   # max number of salient regions to return
  min_score: 0.3             # minimum saliency score (0-1)
  temporal_weight: 0.3       # weight for temporal changes vs spatial saliency

optical_flow:
  enabled: true
  pyr_scale: 0.5             # Farneback pyramid scale
  levels: 3                  # pyramid levels
  winsize: 15                # averaging window size
  iterations: 3              # iterations at each pyramid level
  poly_n: 5                  # area of pixel neighborhood
  poly_sigma: 1.2            # Gaussian standard deviation

scene_graph:
  enabled: true
  near_threshold: 150        # max distance for "near" relation (pixels)
  containment_threshold: 0.7 # min overlap ratio for inside/contains

working_memory:
  enabled: true
  memory_duration: 30.0      # seconds to remember lost entities
  max_remembered: 50         # max remembered lost entities
  reid_threshold: 0.6        # min histogram similarity for Re-ID
  max_episodes: 100          # max episodic memory entries
  hist_bins: 32              # color histogram bins per channel

aggregation:
  coordinate_precision: 5    # round to nearest N pixels
  min_movement_threshold: 10 # ignore moves below N pixels
  batch_frames: 5           # accumulate N frames before LLM call
  max_tokens: 4000          # total token budget per LLM call

narration:
  model: "gemini/gemini-3.1-flash-lite-preview"
  fallback_model: "gpt-4o"
  min_interval_seconds: 5.0
  max_context_entries: 3
  max_crops: 2
  crop_jpeg_quality: 70
  send_screenshot: true
  screenshot_max_dimension: 960
  screenshot_jpeg_quality: 50

device:
  prefer: "auto"  # auto, cuda, directml, cpu
